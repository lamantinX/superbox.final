        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-background font-body text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-white/70 backdrop-blur-xl docked full-width top-0 sticky z-50 shadow-[0_8px_30px_rgb(129,28,217,0.06)]">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-screen-2xl mx-auto">
<div class="flex items-center gap-8">
<span class="text-2xl font-black italic bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-purple-600 font-headline tracking-tight">SUPERBOX</span>
<nav class="hidden md:flex gap-6">
<a class="text-slate-500 hover:text-pink-500 transition-colors font-headline font-bold" href="#">Track</a>
<a class="text-purple-700 font-extrabold border-b-2 border-purple-500 font-headline" href="#">Services</a>
<a class="text-slate-500 hover:text-pink-500 transition-colors font-headline font-bold" href="#">History</a>
</nav>
</div>
<div class="flex items-center gap-4">
<button class="p-2 text-slate-500 hover:bg-slate-50/50 rounded-full transition-all duration-300 scale-95 active:scale-90">
<span class="material-symbols-outlined">notifications</span>
</button>
<div class="w-10 h-10 rounded-full bg-surface-container overflow-hidden border-2 border-white shadow-sm">
<img alt="User profile" class="w-full h-full object-cover" data-alt="User avatar portrait smiling" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBYnLsAvtvlozrWapnyenVtulEL4P1LYM1GxsHxZgXEZiec-F6l3eNUUtqiTttmle5vXB1u5aAgKrCIBfIXbR0leyOl3xmpmz2E-Mz005JmrhMIjxqx-8ZblZbJCAg-YCxjSH5NjSe4IthqPo7F39CB0kTP78z-dzRI9O3ycH6rrv47SUfRy8U7E5JqtUUFQO2wu-zN_GYxy6oueDHc0VdmZOdi4dQ3iLVseKnrta9te40-3wl4gTs0GP72FqeXxKea82C9g9DERtmZ"/>
</div>
</div>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-6 py-12">
<div class="w-full max-w-3xl space-y-12">
<!-- Header Section -->
<div class="text-center space-y-4">
<h1 class="text-5xl md:text-6xl font-headline font-extrabold tracking-tight text-on-surface">
                    Заказ по ссылке
                </h1>
<p class="text-lg md:text-xl text-on-surface-variant max-w-xl mx-auto font-body leading-relaxed">
                    Просто вставьте ссылку на товар и мы сделаем все остальное
                </p>
</div>
<!-- Input Section -->
<div class="relative group">
<div class="absolute -inset-1 bg-gradient-to-r from-pink-500/20 to-purple-600/20 rounded-[3.5rem] blur opacity-25 group-focus-within:opacity-100 transition duration-1000"></div>
<div class="relative flex items-center bg-surface-container-lowest p-2 pl-8 rounded-full shadow-[0_10px_40px_rgba(0,0,0,0.04)] ring-1 ring-black/5">
<span class="material-symbols-outlined text-outline-variant mr-4">link</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body text-lg py-4" placeholder="https://store.com/product/..." type="text" value="https://example.com/item/premium-tech-headphones-v2"/>
<button class="bg-brand-gradient text-white px-10 py-4 rounded-full font-headline font-bold shadow-lg shadow-purple-500/20 hover:scale-[1.02] active:scale-95 transition-all duration-300 ml-4">
                        Import
                    </button>
</div>
</div>
<!-- Preview Card (Simulated After Import) -->
<div class="relative bg-surface-container-lowest rounded-xl p-6 md:p-8 flex flex-col md:flex-row gap-8 shadow-[0_20px_50px_rgba(129,28,217,0.08)] items-center md:items-start border border-white/50">
<!-- Product Image -->
<div class="w-full md:w-48 h-48 rounded-lg overflow-hidden bg-surface-container-low shrink-0 relative group">
<img alt="Product" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" data-alt="Premium wireless headphones on a clean background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAYglJpH2ZFqApYa5IPebcgfqq0MeYVu-0z9Jw0ifw4yvC4YHfVPDfA_0Zkh8dYnkz8eYHsxzuh6EG1leBH5J8W3lAYjx7jCKCYn8b-0DIaGVkrecLjeKRnpoWoS9JSOoVnAAJbV94jntXEnTbci5YXjuVetz_aK5T6O-tSI3s58ydys4m-I6qpZVuOAu-Xxw67yUTd4UJ57Ifm7DIrM8iAmVQcGkge9SU0oKnD-3MkWBbpJJE_fEZW2kk44-ikknrWz2lnI9QXVZKe"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
</div>
<!-- Product Info -->
<div class="flex-grow space-y-4 text-center md:text-left">
<div class="space-y-1">
<span class="text-xs font-bold uppercase tracking-widest text-primary font-headline">Electronics</span>
<h2 class="text-2xl font-headline font-bold text-on-surface leading-tight">Example Product Name</h2>
</div>
<div class="flex flex-wrap items-center justify-center md:justify-start gap-4">
<div class="bg-surface-container-low px-4 py-2 rounded-full flex items-center gap-2">
<span class="text-on-surface-variant text-sm font-medium">Color:</span>
<span class="w-4 h-4 rounded-full bg-slate-800 border border-white/20"></span>
<span class="text-on-surface font-bold text-sm">Space Black</span>
</div>
<div class="bg-surface-container-low px-4 py-2 rounded-full flex items-center gap-2">
<span class="text-on-surface-variant text-sm font-medium">Size:</span>
<span class="text-on-surface font-bold text-sm">One Size</span>
</div>
</div>
<div class="pt-2">
<span class="text-4xl font-headline font-black text-on-surface tracking-tighter">999 ₽</span>
</div>
</div>
</div>
<!-- Final Action -->
<div class="flex flex-col items-center gap-6">
<button class="w-full md:w-auto min-w-[320px] bg-brand-gradient text-white px-12 py-6 rounded-full font-headline font-extrabold text-xl shadow-[0_15px_45px_rgba(168,33,110,0.3)] hover:shadow-[0_20px_60px_rgba(168,33,110,0.4)] transition-all duration-500 flex items-center justify-center gap-3">
                    Добавить в заказ
                    <span class="material-symbols-outlined">shopping_bag</span>
</button>
<button class="text-on-surface-variant font-headline font-bold hover:text-primary transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-sm">refresh</span>
                    Сбросить и вставить другую ссылку
                </button>
</div>
</div>
</main>
<!-- Footer -->
<footer class="bg-slate-50 full-width py-12 border-t border-slate-200/10 tonal-shift-bg">
<div class="flex flex-col md:flex-row justify-between items-center px-8 w-full max-w-7xl mx-auto space-y-4 md:space-y-0">
<span class="text-lg font-bold text-slate-400 font-headline">SUPERBOX</span>
<div class="flex gap-8">
<a class="text-slate-400 hover:text-purple-500 font-label text-sm tracking-wide hover:translate-y-[-2px] transition-transform duration-200" href="#">Privacy</a>
<a class="text-slate-400 hover:text-purple-500 font-label text-sm tracking-wide hover:translate-y-[-2px] transition-transform duration-200" href="#">Terms</a>
<a class="text-slate-400 hover:text-purple-500 font-label text-sm tracking-wide hover:translate-y-[-2px] transition-transform duration-200" href="#">Support</a>
<a class="text-slate-400 hover:text-purple-500 font-label text-sm tracking-wide hover:translate-y-[-2px] transition-transform duration-200" href="#">Careers</a>
</div>
<p class="font-label text-sm tracking-wide text-slate-500 opacity-80">© 2024 SUPERBOX. The Fluid Concierge.</p>
</div>
</footer>
</body></html>
